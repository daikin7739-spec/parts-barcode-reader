<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>S/Nバーコード読み取りテスト</title>
<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<style>
:root{--bg:#f5f7fb;--card:#fff;--text:#162033;--muted:#68758a;--border:#d9e0ea;--accent:#1f6feb;--ok:#047857;--warn:#b54708;--danger:#b42318;--dark:#344054}
*{box-sizing:border-box}
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","BIZ UDPGothic","Yu Gothic",sans-serif;background:var(--bg);color:var(--text);padding:env(safe-area-inset-top) 14px env(safe-area-inset-bottom)}
.wrap{max-width:820px;margin:0 auto;padding:14px 0 28px}
.badge{display:inline-flex;padding:6px 10px;border:1px solid var(--border);border-radius:999px;background:var(--card);color:var(--muted);font-size:13px;margin-bottom:10px}
h1{font-size:25px;line-height:1.25;margin:4px 0 8px;letter-spacing:-.02em}
p{color:var(--muted);margin:0 0 14px;line-height:1.55}
.card{background:var(--card);border:1px solid var(--border);border-radius:20px;box-shadow:0 8px 30px rgba(20,40,80,.07);padding:14px;margin:12px 0;overflow:hidden}
#reader{width:100%;min-height:300px;border-radius:16px;overflow:hidden;background:#0b1220}
.btns{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:12px}
button{appearance:none;border:0;border-radius:16px;padding:14px 12px;font-size:16px;font-weight:800;color:#fff;background:var(--accent)}
button.secondary{background:var(--dark)}button.danger{background:var(--danger)}button.light{background:#eef3fb;color:var(--text);border:1px solid var(--border)}button:disabled{opacity:.45}
input,select{width:100%;border:1px solid var(--border);border-radius:16px;padding:13px 12px;font-size:16px;margin-bottom:10px;background:#fff}
textarea{width:100%;min-height:120px;border:1px solid var(--border);border-radius:16px;padding:12px;font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;font-size:13px;resize:vertical}
.label{font-size:13px;color:var(--muted);margin:2px 0 8px;font-weight:800}
.row{display:flex;justify-content:space-between;gap:10px;align-items:center}
.status{font-weight:900;padding:7px 10px;border-radius:999px;background:#eef3fb;font-size:13px;color:#344054;white-space:nowrap}
.status.ok{color:var(--ok);background:#ecfdf3}.status.warn{color:var(--warn);background:#fffaeb}.status.danger{color:var(--danger);background:#fff1f3}
.latest{min-height:76px;padding:14px;border:1px solid var(--border);border-radius:16px;background:#f8fafc;word-break:break-all;font-size:22px;font-weight:900;display:flex;align-items:center}
.empty{color:#98a2b3;font-size:15px;font-weight:700}
.hint{font-size:13px;line-height:1.55;color:var(--muted);background:#f8fafc;border:1px dashed var(--border);border-radius:16px;padding:12px;margin-top:10px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.metric{border:1px solid var(--border);background:#f8fafc;border-radius:16px;padding:12px}.metric .num{font-size:22px;font-weight:900}.metric .cap{font-size:12px;color:var(--muted);font-weight:800}
table{width:100%;border-collapse:collapse;font-size:13px}th,td{border-bottom:1px solid var(--border);padding:10px 8px;vertical-align:top;text-align:left}th{color:var(--muted);background:#f8fafc}.code{word-break:break-all;font-weight:900}
.notice{padding:10px 12px;border-radius:16px;background:#f8fafc;border:1px solid var(--border);font-size:14px;line-height:1.5}
.oktext{color:var(--ok);font-weight:900}.warntext{color:var(--warn);font-weight:900}
</style>
</head>
<body>
<main class="wrap">
  <div class="badge">S/N読み取りテスト専用 / P/N不要 / 送信なし</div>
  <h1>S/Nバーコード読み取りテスト</h1>
  <p>まずはS/Nバーコードがスマホカメラで読めるかだけを確認します。P/N切替、在庫集計、除外判定は入れていません。</p>

  <section class="card">
    <div class="row"><div class="label">カメラ読み取り</div><div id="status" class="status">停止中</div></div>
    <div class="grid2">
      <div>
        <div class="label">読み取り形式</div>
        <select id="formatMode">
          <option value="code128" selected>CODE128のみ</option>
          <option value="code39">CODE39のみ</option>
          <option value="all">全形式</option>
          <option value="qr">QR/DataMatrixのみ</option>
        </select>
      </div>
      <div>
        <div class="label">読み取り動作</div>
        <select id="scanMode">
          <option value="continuous" selected>連続読み取り</option>
          <option value="pause">1件読んだら停止</option>
        </select>
      </div>
    </div>
    <div id="reader"></div>
    <div class="btns"><button id="startBtn">読み取り開始</button><button id="stopBtn" class="secondary" disabled>停止</button></div>
    <div class="hint">S/N欄のバーコードだけを画面中央に入れてください。まずはCODE128のみで試します。</div>
  </section>

  <section class="card">
    <div class="label">最新読み取り結果</div>
    <div id="latest" class="latest"><span class="empty">未読み取り</span></div>
    <div class="grid2" style="margin-top:10px">
      <div class="metric"><div id="totalCount" class="num">0</div><div class="cap">読み取り件数</div></div>
      <div class="metric"><div id="uniqueCount" class="num">0</div><div class="cap">ユニーク件数</div></div>
    </div>
    <div id="notice" class="notice" style="margin-top:10px">状態：待機中</div>
  </section>

  <section class="card">
    <div class="label">手入力テスト</div>
    <input id="manualSN" placeholder="読めない場合はS/Nを手入力して追加">
    <button id="addManualBtn" class="secondary">手入力を履歴に追加</button>
  </section>

  <section class="card">
    <div class="row"><div class="label">読み取り履歴</div><button id="copyCsvBtn" class="light" style="width:auto;padding:10px 12px">CSVコピー</button></div>
    <table><thead><tr><th>No</th><th>時刻</th><th>読み取り値</th><th>形式</th><th>桁数</th><th>判定</th></tr></thead><tbody id="historyBody"><tr><td colspan="6" class="empty">履歴なし</td></tr></tbody></table>
    <div class="btns"><button id="copyLatestBtn" class="light">最新値コピー</button><button id="clearBtn" class="danger">全クリア</button></div>
  </section>

  <section class="card">
    <div class="label">CSV出力プレビュー</div>
    <textarea id="csvText" readonly placeholder="CSVコピー時にここへ表示されます"></textarea>
  </section>
</main>

<script>
let scanner = null;
let rows = [];
let latest = "";

const $ = id => document.getElementById(id);
const statusEl = $("status"), latestEl = $("latest"), totalCountEl = $("totalCount"), uniqueCountEl = $("uniqueCount"), noticeEl = $("notice"), historyBody = $("historyBody"), csvText = $("csvText"), startBtn = $("startBtn"), stopBtn = $("stopBtn"), formatMode = $("formatMode"), scanMode = $("scanMode"), manualSN = $("manualSN");

function setStatus(text, cls=""){ statusEl.textContent = text; statusEl.className = "status " + cls; }

function getFormats(){
  const F = Html5QrcodeSupportedFormats;
  const mode = formatMode.value;
  if(mode === "code128") return [F.CODE_128];
  if(mode === "code39") return [F.CODE_39];
  if(mode === "qr") return [F.QR_CODE, F.DATA_MATRIX];
  return [F.CODE_128, F.CODE_39, F.EAN_13, F.EAN_8, F.UPC_A, F.UPC_E, F.ITF, F.QR_CODE, F.DATA_MATRIX];
}

function normalizeValue(v){ return String(v || "").trim().toUpperCase(); }

function judgeValue(v){
  if(!v) return "空白";
  if(v.length < 4) return "短い";
  if(/^[0-9]+$/.test(v)) return "数字のみ";
  if(/^[A-Z]{2}$/.test(v)) return "2文字";
  if(/^[0-9]{3,6}-[0-9]{3,8}$/.test(v)) return "P/Nっぽい";
  return "候補";
}

function addValue(raw, format){
  const value = normalizeValue(raw);
  if(!value) return;
  const duplicate = rows.some(r => r.value === value);
  latest = value;
  rows.unshift({
    time: new Date().toLocaleString("ja-JP"),
    value,
    format: String(format || "unknown"),
    len: value.length,
    judge: duplicate ? "重複" : judgeValue(value)
  });
  latestEl.textContent = value;
  noticeEl.innerHTML = duplicate ? `<span class="warntext">重複候補：</span>${esc(value)}` : `<span class="oktext">読み取り：</span>${esc(value)}`;
  render();
  if(scanMode.value === "pause") stopScan();
}

function onDecoded(decodedText, decodedResult){
  const fmt = decodedResult?.result?.format?.formatName || decodedResult?.result?.format || "unknown";
  addValue(decodedText, fmt);
}

async function startScan(){
  try{
    setStatus("起動中", "warn");
    startBtn.disabled = true;
    stopBtn.disabled = false;
    if(!scanner) scanner = new Html5Qrcode("reader");
    const config = {
      fps: 12,
      qrbox: function(w,h){
        const minEdge = Math.min(w,h);
        return { width: Math.floor(minEdge * 0.92), height: Math.floor(minEdge * 0.26) };
      },
      rememberLastUsedCamera: true,
      formatsToSupport: getFormats()
    };
    await scanner.start({ facingMode: "environment" }, config, onDecoded, _ => {});
    setStatus("読み取り中", "warn");
    noticeEl.textContent = "状態：S/Nバーコードを中央に入れてください";
  }catch(e){
    console.error(e);
    setStatus("エラー", "danger");
    startBtn.disabled = false;
    stopBtn.disabled = true;
    alert("カメラ起動に失敗しました。HTTPS、カメラ許可、Safari/Chrome設定を確認してください。");
  }
}

async function stopScan(){
  try{ if(scanner && scanner.isScanning) await scanner.stop(); }catch(e){ console.warn(e); }
  setStatus("停止中");
  startBtn.disabled = false;
  stopBtn.disabled = true;
}

function render(){
  totalCountEl.textContent = rows.length;
  uniqueCountEl.textContent = new Set(rows.map(r => r.value)).size;
  if(!rows.length){
    historyBody.innerHTML = '<tr><td colspan="6" class="empty">履歴なし</td></tr>';
    csvText.value = "";
    return;
  }
  historyBody.innerHTML = rows.map((r, i) => `
    <tr><td>${rows.length - i}</td><td>${esc(r.time)}</td><td class="code">${esc(r.value)}</td><td>${esc(r.format)}</td><td>${r.len}</td><td>${esc(r.judge)}</td></tr>
  `).join("");
}

function makeCsv(){
  const header = ["No","時刻","読み取り値","形式","桁数","判定"].join(",");
  const body = rows.slice().reverse().map((r, i) => [i + 1, csv(r.time), csv(r.value), csv(r.format), r.len, csv(r.judge)].join(","));
  return [header, ...body].join("\n");
}

function csv(v){ v = String(v ?? ""); return /[",\n]/.test(v) ? '"' + v.replace(/"/g,'""') + '"' : v; }
function esc(s){ return String(s).replace(/[&<>"']/g, c => ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" }[c])); }

async function copyText(text){
  csvText.value = text;
  try{ await navigator.clipboard.writeText(text); setStatus("コピー済み", "ok"); }
  catch(e){ csvText.select(); document.execCommand("copy"); }
}

startBtn.addEventListener("click", startScan);
stopBtn.addEventListener("click", stopScan);
$("addManualBtn").addEventListener("click", () => { addValue(manualSN.value, "manual"); manualSN.value = ""; });
$("copyCsvBtn").addEventListener("click", () => copyText(makeCsv()));
$("copyLatestBtn").addEventListener("click", () => copyText(latest));
$("clearBtn").addEventListener("click", () => {
  if(confirm("読み取り履歴を全て消しますか？")){
    rows = [];
    latest = "";
    latestEl.innerHTML = '<span class="empty">未読み取り</span>';
    noticeEl.textContent = "状態：待機中";
    render();
  }
});
formatMode.addEventListener("change", async () => { if(scanner && scanner.isScanning) await stopScan(); });
render();
</script>
</body>
</html>
