<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>パーツバーコードリーダー</title>
  <style>
    :root {
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #667085;
      --line: #d9e0ea;
      --blue: #2563eb;
      --dark: #111827;
      --ok: #0f766e;
      --warn: #b45309;
      --danger: #b91c1c;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "BIZ UDPGothic", "BIZ UDPゴシック", sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .wrap {
      width: min(960px, 100%);
      margin: 0 auto;
      padding: 20px 16px 36px;
    }

    h1 {
      margin: 14px 0 8px;
      font-size: 30px;
      line-height: 1.25;
      letter-spacing: -0.03em;
    }

    .lead {
      margin: 0 0 18px;
      color: var(--muted);
      line-height: 1.7;
      font-size: 16px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 22px;
      padding: 18px;
      box-shadow: 0 12px 32px rgba(15, 23, 42, 0.06);
      margin-bottom: 16px;
    }

    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    @media (max-width: 720px) {
      .row {
        grid-template-columns: 1fr;
      }
    }

    label {
      display: block;
      font-weight: 700;
      color: #475467;
      margin-bottom: 8px;
      font-size: 14px;
    }

    select,
    button,
    input {
      width: 100%;
      min-height: 48px;
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 10px 14px;
      font-size: 16px;
      background: #fff;
    }

    button {
      border: 0;
      background: var(--dark);
      color: white;
      font-weight: 800;
      cursor: pointer;
    }

    button.secondary {
      background: #e8eef7;
      color: var(--dark);
    }

    button.danger {
      background: #fee2e2;
      color: var(--danger);
    }

    button:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    .controls {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-top: 12px;
    }

    @media (max-width: 720px) {
      .controls {
        grid-template-columns: 1fr;
      }
    }

    .cameraBox {
      position: relative;
      overflow: hidden;
      border-radius: 20px;
      background: #000;
      border: 1px solid var(--line);
      margin-top: 14px;
      min-height: 280px;
    }

    video {
      display: block;
      width: 100%;
      height: min(62vh, 560px);
      object-fit: cover;
      background: #000;
    }

    .scanFrame {
      position: absolute;
      left: 7%;
      right: 7%;
      top: 35%;
      height: 24%;
      border: 5px solid rgba(255, 255, 255, 0.92);
      border-radius: 10px;
      pointer-events: none;
      box-shadow: 0 0 0 999px rgba(0, 0, 0, 0.18);
    }

    .scanLine {
      position: absolute;
      left: 9%;
      right: 9%;
      top: 47%;
      border-top: 3px solid rgba(37, 99, 235, 0.9);
      pointer-events: none;
    }

    .status {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border-radius: 999px;
      padding: 8px 12px;
      font-weight: 800;
      font-size: 14px;
      background: #fff7ed;
      color: var(--warn);
      margin-top: 8px;
    }

    .status.ok {
      background: #ecfdf5;
      color: var(--ok);
    }

    .status.bad {
      background: #fef2f2;
      color: var(--danger);
    }

    .resultMain {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    @media (max-width: 720px) {
      .resultMain {
        grid-template-columns: 1fr;
      }
    }

    .resultBox {
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 14px;
      background: #fbfdff;
    }

    .resultBox .title {
      color: #667085;
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 8px;
    }

    .resultBox .value {
      font-size: 22px;
      font-weight: 900;
      word-break: break-all;
    }

    .none {
      color: #98a2b3;
      font-weight: 700;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      overflow: hidden;
      border-radius: 14px;
      margin-top: 10px;
    }

    th,
    td {
      border-bottom: 1px solid var(--line);
      padding: 10px 8px;
      text-align: left;
      font-size: 14px;
      vertical-align: top;
    }

    th {
      color: #475467;
      background: #f8fafc;
      font-size: 13px;
    }

    .pill {
      display: inline-block;
      border-radius: 999px;
      padding: 3px 8px;
      font-size: 12px;
      font-weight: 800;
      background: #e8eef7;
      color: #344054;
      white-space: nowrap;
    }

    .hint {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.7;
      margin-top: 10px;
    }

    .small {
      font-size: 12px;
      color: var(--muted);
    }
  </style>
</head>

<body>
  <main class="wrap">
    <h1>パーツバーコードリーダー</h1>
    <p class="lead">
      読めるバーコードを自動で拾って一覧表示します。S/N候補とP/N候補は読み取り結果から自動判定します。
    </p>

    <section class="card">
      <div class="row">
        <div>
          <label for="mode">読み取り動作</label>
          <select id="mode">
            <option value="continuous" selected>連続読み取り</option>
            <option value="once">1件読んだら停止</option>
          </select>
        </div>
        <div>
          <label for="cameraSelect">カメラ</label>
          <select id="cameraSelect">
            <option value="">背面カメラを自動選択</option>
          </select>
        </div>
      </div>

      <div class="controls">
        <button id="startBtn">読み取り開始</button>
        <button id="stopBtn" class="secondary" disabled>停止</button>
      </div>

      <div id="status" class="status">待機中</div>

      <div class="cameraBox">
        <video id="video" autoplay playsinline muted></video>
        <div class="scanFrame"></div>
        <div class="scanLine"></div>
      </div>

      <p class="hint">
        コツ：ラベル全体ではなく、バーコードが白枠に大きく入る距離にしてください。複数ある場合は読めた順に下の一覧へ追加します。
      </p>
    </section>

    <section class="card">
      <div class="resultMain">
        <div class="resultBox">
          <div class="title">S/N候補</div>
          <div id="snValue" class="value none">なし</div>
        </div>
        <div class="resultBox">
          <div class="title">P/N候補</div>
          <div id="pnValue" class="value none">なし</div>
        </div>
      </div>

      <div class="controls">
        <button id="copyBtn" class="secondary">S/Nをコピー</button>
        <button id="clearBtn" class="danger">結果クリア</button>
      </div>

      <p id="countText" class="hint">読み取り件数：0</p>

      <table>
        <thead>
          <tr>
            <th style="width:52px;">No</th>
            <th>値</th>
            <th style="width:110px;">判定</th>
            <th style="width:120px;">形式</th>
          </tr>
        </thead>
        <tbody id="resultBody">
          <tr>
            <td colspan="4" class="small">まだ読み取り結果はありません。</td>
          </tr>
        </tbody>
      </table>
    </section>
  </main>

  <script>
    const video = document.getElementById("video");
    const startBtn = document.getElementById("startBtn");
    const stopBtn = document.getElementById("stopBtn");
    const clearBtn = document.getElementById("clearBtn");
    const copyBtn = document.getElementById("copyBtn");
    const statusEl = document.getElementById("status");
    const resultBody = document.getElementById("resultBody");
    const countText = document.getElementById("countText");
    const snValue = document.getElementById("snValue");
    const pnValue = document.getElementById("pnValue");
    const modeEl = document.getElementById("mode");
    const cameraSelect = document.getElementById("cameraSelect");

    let stream = null;
    let detector = null;
    let timerId = null;
    let results = [];

    const supportedFormats = [
      "code_128",
      "code_39",
      "code_93",
      "codabar",
      "ean_13",
      "ean_8",
      "itf",
      "upc_a",
      "upc_e",
      "qr_code",
      "data_matrix",
      "pdf417",
      "aztec"
    ];

    function setStatus(text, type = "") {
      statusEl.textContent = text;
      statusEl.className = "status" + (type ? " " + type : "");
    }

    function normalizeValue(value) {
      return String(value || "").trim();
    }

    function classify(value) {
      const v = normalizeValue(value);

      if (/^[0-9]{4}-[0-9]{5}$/.test(v)) {
        return "P/N";
      }

      if (/^[A-Za-z0-9]+-[A-Za-z0-9]+$/.test(v) && !/^[0-9]{4}-[0-9]{5}$/.test(v)) {
        return "S/N";
      }

      if (/^[0-9]+$/.test(v)) {
        return "数量/数値";
      }

      return "不明";
    }

    function addResult(value, format) {
      const v = normalizeValue(value);
      if (!v) return;

      const exists = results.some(x => x.value === v);
      if (exists) return;

      results.push({
        value: v,
        format: format || "",
        kind: classify(v),
        time: new Date()
      });

      renderResults();

      if (modeEl.value === "once") {
        stopScan();
      }
    }

    function renderResults() {
      countText.textContent = "読み取り件数：" + results.length;

      const sn = results.find(x => x.kind === "S/N");
      const pn = results.find(x => x.kind === "P/N");

      snValue.textContent = sn ? sn.value : "なし";
      snValue.className = "value" + (sn ? "" : " none");

      pnValue.textContent = pn ? pn.value : "なし";
      pnValue.className = "value" + (pn ? "" : " none");

      if (results.length === 0) {
        resultBody.innerHTML = '<tr><td colspan="4" class="small">まだ読み取り結果はありません。</td></tr>';
        return;
      }

      resultBody.innerHTML = results.map((r, i) => `
        <tr>
          <td>${i + 1}</td>
          <td><strong>${escapeHtml(r.value)}</strong></td>
          <td><span class="pill">${escapeHtml(r.kind)}</span></td>
          <td>${escapeHtml(r.format)}</td>
        </tr>
      `).join("");
    }

    function escapeHtml(text) {
      return String(text)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    async function loadCameras() {
      try {
        const devices = await navigator.mediaDevices.enumerateDevices();
        const cameras = devices.filter(d => d.kind === "videoinput");

        cameraSelect.innerHTML = '<option value="">背面カメラを自動選択</option>';

        cameras.forEach((cam, idx) => {
          const opt = document.createElement("option");
          opt.value = cam.deviceId;
          opt.textContent = cam.label || `カメラ ${idx + 1}`;
          cameraSelect.appendChild(opt);
        });
      } catch (e) {
        console.warn(e);
      }
    }

    async function startScan() {
      try {
        if (!("BarcodeDetector" in window)) {
          setStatus("このブラウザはBarcodeDetector非対応です。Chrome/Androidか対応ブラウザで確認してください。", "bad");
          return;
        }

        const formats = await BarcodeDetector.getSupportedFormats();
        const useFormats = supportedFormats.filter(f => formats.includes(f));

        if (useFormats.length === 0) {
          setStatus("対応バーコード形式が見つかりません。", "bad");
          return;
        }

        detector = new BarcodeDetector({ formats: useFormats });

        const selectedCamera = cameraSelect.value;

        const constraints = selectedCamera
          ? { video: { deviceId: { exact: selectedCamera } }, audio: false }
          : { video: { facingMode: { ideal: "environment" }, width: { ideal: 1280 }, height: { ideal: 720 } }, audio: false };

        stream = await navigator.mediaDevices.getUserMedia(constraints);
        video.srcObject = stream;
        await video.play();

        await loadCameras();

        startBtn.disabled = true;
        stopBtn.disabled = false;
        setStatus("読み取り中", "ok");

        timerId = setInterval(detectFrame, 350);
      } catch (e) {
        console.error(e);
        setStatus("カメラ起動に失敗：" + (e.message || e), "bad");
        stopScan();
      }
    }

    async function detectFrame() {
      if (!detector || !video || video.readyState < 2) return;

      try {
        const codes = await detector.detect(video);

        if (!codes || codes.length === 0) return;

        codes.forEach(code => {
          addResult(code.rawValue, code.format);
        });
      } catch (e) {
        console.warn(e);
      }
    }

    function stopScan() {
      if (timerId) {
        clearInterval(timerId);
        timerId = null;
      }

      if (stream) {
        stream.getTracks().forEach(track => track.stop());
        stream = null;
      }

      video.srcObject = null;
      startBtn.disabled = false;
      stopBtn.disabled = true;

      if (statusEl.textContent === "読み取り中") {
        setStatus("停止中");
      }
    }

    clearBtn.addEventListener("click", () => {
      results = [];
      renderResults();
      setStatus("結果をクリアしました");
    });

    copyBtn.addEventListener("click", async () => {
      const sn = results.find(x => x.kind === "S/N");

      if (!sn) {
        setStatus("コピーできるS/N候補がありません", "bad");
        return;
      }

      try {
        await navigator.clipboard.writeText(sn.value);
        setStatus("S/Nをコピーしました：" + sn.value, "ok");
      } catch (e) {
        setStatus("コピーに失敗しました：" + sn.value, "bad");
      }
    });

    startBtn.addEventListener("click", startScan);
    stopBtn.addEventListener("click", stopScan);

    window.addEventListener("pagehide", stopScan);

    renderResults();

    if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
      setStatus("このブラウザはカメラ取得に対応していません。", "bad");
    } else {
      loadCameras();
    }
  </script>
</body>
</html>
