<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>S/Nバーコード読み取り</title>

  <script src="https://unpkg.com/@zxing/browser@latest"></script>

  <style>
    :root {
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #6b7280;
      --primary: #111827;
      --primaryText: #ffffff;
      --border: #d9dee8;
      --danger: #b91c1c;
      --success: #047857;
      --soft: #eef2f7;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .wrap {
      max-width: 760px;
      margin: 0 auto;
      padding: 18px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 22px;
      padding: 18px;
      box-shadow: 0 8px 24px rgba(15, 23, 42, 0.06);
      margin-bottom: 16px;
    }

    h1 {
      font-size: 22px;
      margin: 0 0 6px;
    }

    .desc {
      color: var(--muted);
      font-size: 14px;
      line-height: 1.6;
      margin-bottom: 16px;
    }

    label {
      display: block;
      font-weight: 700;
      margin: 14px 0 8px;
      font-size: 15px;
    }

    select,
    input,
    textarea {
      width: 100%;
      font-size: 16px;
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 13px 14px;
      background: #fff;
      color: var(--text);
    }

    button {
      width: 100%;
      border: 0;
      border-radius: 16px;
      padding: 15px 14px;
      font-size: 17px;
      font-weight: 800;
      margin-top: 12px;
      cursor: pointer;
    }

    .btn-primary {
      background: var(--primary);
      color: var(--primaryText);
    }

    .btn-soft {
      background: var(--soft);
      color: var(--text);
    }

    .btn-danger {
      background: #fee2e2;
      color: var(--danger);
    }

    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .videoBox {
      position: relative;
      width: 100%;
      background: #000;
      border-radius: 22px;
      overflow: hidden;
      min-height: 360px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    video {
      width: 100%;
      height: 100%;
      min-height: 360px;
      object-fit: cover;
      background: #000;
    }

    .scanGuide {
      position: absolute;
      left: 12%;
      right: 12%;
      top: 40%;
      height: 110px;
      border: 5px solid rgba(255, 255, 255, 0.92);
      border-radius: 14px;
      pointer-events: none;
    }

    .scanLine {
      position: absolute;
      left: 12%;
      right: 12%;
      top: calc(40% + 55px);
      height: 3px;
      background: #2563eb;
      pointer-events: none;
    }

    .status {
      margin-top: 12px;
      padding: 12px 14px;
      border-radius: 14px;
      background: #f3f4f6;
      color: var(--muted);
      font-weight: 700;
      line-height: 1.5;
    }

    .status.ok {
      background: #dcfce7;
      color: var(--success);
    }

    .status.ng {
      background: #fee2e2;
      color: var(--danger);
    }

    .count {
      font-size: 18px;
      font-weight: 900;
      margin: 4px 0 12px;
    }

    .list {
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
      background: #fff;
    }

    .item {
      display: grid;
      grid-template-columns: 44px 1fr 44px;
      align-items: center;
      gap: 8px;
      padding: 12px 10px;
      border-bottom: 1px solid var(--border);
      font-size: 15px;
    }

    .item:last-child {
      border-bottom: 0;
    }

    .no {
      color: var(--muted);
      font-weight: 800;
      text-align: right;
    }

    .code {
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      word-break: break-all;
      font-weight: 800;
    }

    .deleteOne {
      background: #f3f4f6;
      color: #374151;
      padding: 8px;
      margin: 0;
      border-radius: 10px;
      font-size: 14px;
    }

    textarea {
      height: 160px;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      margin-top: 10px;
    }

    .small {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.6;
      margin-top: 10px;
    }

    @media (max-width: 520px) {
      .wrap {
        padding: 14px;
      }

      .row {
        grid-template-columns: 1fr;
      }

      .videoBox,
      video {
        min-height: 420px;
      }
    }
  </style>
</head>

<body>
  <div class="wrap">
    <div class="card">
      <h1>S/Nバーコード読み取り</h1>
      <div class="desc">
        iPhone対応版です。S/Nバーコードを連続で読み取り、一覧に追加します。
        同じS/Nを連続で読んだ場合は重複登録しません。
      </div>

      <label for="cameraSelect">カメラ</label>
      <select id="cameraSelect">
        <option value="">背面カメラを自動選択</option>
      </select>

      <button class="btn-primary" id="startBtn">読み取り開始</button>
      <button class="btn-soft" id="stopBtn" disabled>停止</button>

      <div id="status" class="status">待機中です。</div>
    </div>

    <div class="card">
      <div class="videoBox">
        <video id="video" muted playsinline></video>
        <div class="scanGuide"></div>
        <div class="scanLine"></div>
      </div>

      <div class="small">
        読みにくい場合は、バーコードを白枠の中央に入れて、少し距離を変えてください。
      </div>
    </div>

    <div class="card">
      <div class="count">読み取り件数：<span id="count">0</span></div>

      <label for="manualInput">手入力で追加</label>
      <input id="manualInput" placeholder="S/Nを手入力して追加できます" />
      <button class="btn-soft" id="manualAddBtn">手入力を追加</button>

      <label>読み取り一覧</label>
      <div id="list" class="list">
        <div class="item">
          <div class="no">-</div>
          <div class="code">まだ読み取りデータはありません</div>
          <button class="deleteOne" disabled>×</button>
        </div>
      </div>

      <div class="row">
        <button class="btn-soft" id="copyBtn">一覧をコピー</button>
        <button class="btn-soft" id="csvBtn">CSVを作成</button>
      </div>

      <button class="btn-danger" id="clearBtn">一覧をクリア</button>

      <label for="output">コピー用テキスト</label>
      <textarea id="output" readonly></textarea>
    </div>
  </div>

  <script>
    const video = document.getElementById("video");
    const cameraSelect = document.getElementById("cameraSelect");
    const startBtn = document.getElementById("startBtn");
    const stopBtn = document.getElementById("stopBtn");
    const statusBox = document.getElementById("status");
    const listBox = document.getElementById("list");
    const countBox = document.getElementById("count");
    const output = document.getElementById("output");
    const manualInput = document.getElementById("manualInput");
    const manualAddBtn = document.getElementById("manualAddBtn");
    const copyBtn = document.getElementById("copyBtn");
    const csvBtn = document.getElementById("csvBtn");
    const clearBtn = document.getElementById("clearBtn");

    let codeReader = null;
    let controls = null;
    let scannedList = [];
    let lastText = "";
    let lastTime = 0;

    function setStatus(text, type = "") {
      statusBox.textContent = text;
      statusBox.className = "status";
      if (type) statusBox.classList.add(type);
    }

    function normalizeCode(text) {
      return String(text || "")
        .trim()
        .replace(/\s+/g, "");
    }

    function refreshList() {
      countBox.textContent = scannedList.length;

      if (scannedList.length === 0) {
        listBox.innerHTML = `
          <div class="item">
            <div class="no">-</div>
            <div class="code">まだ読み取りデータはありません</div>
            <button class="deleteOne" disabled>×</button>
          </div>
        `;
        output.value = "";
        return;
      }

      listBox.innerHTML = scannedList.map((code, index) => `
        <div class="item">
          <div class="no">${index + 1}</div>
          <div class="code">${escapeHtml(code)}</div>
          <button class="deleteOne" onclick="deleteItem(${index})">×</button>
        </div>
      `).join("");

      output.value = scannedList.join("\n");
    }

    function escapeHtml(str) {
      return String(str)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function addCode(rawText) {
      const text = normalizeCode(rawText);
      if (!text) return;

      const now = Date.now();

      if (text === lastText && now - lastTime < 1500) {
        setStatus(`同じS/Nを連続検出：${text}`, "ok");
        return;
      }

      lastText = text;
      lastTime = now;

      if (scannedList.includes(text)) {
        setStatus(`重複のため追加しません：${text}`, "ng");
        vibrateShort();
        return;
      }

      scannedList.push(text);
      refreshList();
      setStatus(`追加しました：${text}`, "ok");
      vibrateShort();
    }

    function deleteItem(index) {
      scannedList.splice(index, 1);
      refreshList();
      setStatus("1件削除しました。");
    }

    window.deleteItem = deleteItem;

    function vibrateShort() {
      if (navigator.vibrate) {
        navigator.vibrate(80);
      }
    }

    async function loadCameras() {
      try {
        if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
          setStatus("このブラウザはカメラに対応していません。", "ng");
          return;
        }

        const tempStream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: { ideal: "environment" } },
          audio: false
        });

        tempStream.getTracks().forEach(track => track.stop());

        const devices = await ZXingBrowser.BrowserCodeReader.listVideoInputDevices();

        cameraSelect.innerHTML = `<option value="">背面カメラを自動選択</option>`;

        devices.forEach((device, index) => {
          const opt = document.createElement("option");
          opt.value = device.deviceId;
          opt.textContent = device.label || `カメラ ${index + 1}`;
          cameraSelect.appendChild(opt);
        });

        const backCamera = devices.find(d =>
          /back|rear|environment|外|背面/i.test(d.label || "")
        );

        if (backCamera) {
          cameraSelect.value = backCamera.deviceId;
        }
      } catch (err) {
        setStatus("カメラ一覧の取得に失敗しました。iPhoneのカメラ許可を確認してください。", "ng");
      }
    }

    async function startScan() {
      try {
        if (!window.ZXingBrowser) {
          setStatus("読み取りライブラリの読み込みに失敗しました。通信状態を確認してください。", "ng");
          return;
        }

        if (controls) {
          stopScan();
        }

        codeReader = new ZXingBrowser.BrowserMultiFormatReader();

        const selectedDeviceId = cameraSelect.value || undefined;

        startBtn.disabled = true;
        stopBtn.disabled = false;
        setStatus("カメラ起動中です。");

        const constraints = selectedDeviceId
          ? { deviceId: { exact: selectedDeviceId } }
          : { facingMode: { ideal: "environment" } };

        controls = await codeReader.decodeFromConstraints(
          {
            video: constraints,
            audio: false
          },
          video,
          (result, error) => {
            if (result) {
              addCode(result.getText());
            }
          }
        );

        setStatus("読み取り中です。S/Nバーコードを白枠に合わせてください。", "ok");
      } catch (err) {
        startBtn.disabled = false;
        stopBtn.disabled = true;
        setStatus("カメラ起動または読み取り開始に失敗しました。Safariのカメラ許可、HTTPS接続を確認してください。", "ng");
      }
    }

    function stopScan() {
      try {
        if (controls) {
          controls.stop();
          controls = null;
        }

        if (video.srcObject) {
          video.srcObject.getTracks().forEach(track => track.stop());
          video.srcObject = null;
        }

        startBtn.disabled = false;
        stopBtn.disabled = true;
        setStatus("停止しました。");
      } catch (err) {
        setStatus("停止処理でエラーが発生しました。", "ng");
      }
    }

    manualAddBtn.addEventListener("click", () => {
      addCode(manualInput.value);
      manualInput.value = "";
      manualInput.focus();
    });

    manualInput.addEventListener("keydown", (e) => {
      if (e.key === "Enter") {
        addCode(manualInput.value);
        manualInput.value = "";
      }
    });

    copyBtn.addEventListener("click", async () => {
      const text = scannedList.join("\n");
      output.value = text;

      try {
        await navigator.clipboard.writeText(text);
        setStatus("一覧をコピーしました。", "ok");
      } catch (err) {
        output.select();
        document.execCommand("copy");
        setStatus("コピーしました。", "ok");
      }
    });

    csvBtn.addEventListener("click", () => {
      if (scannedList.length === 0) {
        setStatus("CSVにするデータがありません。", "ng");
        return;
      }

      const csv = "No,SN\n" + scannedList
        .map((code, index) => `${index + 1},"${String(code).replaceAll('"', '""')}"`)
        .join("\n");

      const blob = new Blob([csv], { type: "text/csv;charset=utf-8" });
      const url = URL.createObjectURL(blob);

      const a = document.createElement("a");
      a.href = url;
      a.download = "sn_list.csv";
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);

      URL.revokeObjectURL(url);
      setStatus("CSVを作成しました。", "ok");
    });

    clearBtn.addEventListener("click", () => {
      if (!confirm("読み取り一覧をすべて削除しますか？")) return;
      scannedList = [];
      lastText = "";
      lastTime = 0;
      refreshList();
      setStatus("一覧をクリアしました。");
    });

    startBtn.addEventListener("click", startScan);
    stopBtn.addEventListener("click", stopScan);

    window.addEventListener("pagehide", stopScan);
    window.addEventListener("beforeunload", stopScan);

    refreshList();
    loadCameras();
  </script>
</body>
</html>
