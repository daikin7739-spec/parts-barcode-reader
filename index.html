<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>S/N Reader html5-qrcode</title>

  <!-- ZXingではなく html5-qrcode を使用 -->
  <script src="https://unpkg.com/html5-qrcode"></script>

  <style>
    :root {
      --bg: #0f172a;
      --head: #020617;
      --panel: #111827;
      --text: #f9fafb;
      --muted: #9ca3af;
      --border: #374151;
      --blue: #2563eb;
      --green: #16a34a;
      --red: #dc2626;
      --yellow: #facc15;
      --orange: #f97316;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    header {
      background: var(--head);
      border-bottom: 1px solid var(--border);
      padding: 12px;
      text-align: center;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    header h1 {
      margin: 0;
      font-size: 19px;
    }

    header p {
      margin: 5px 0 0;
      font-size: 12px;
      color: var(--muted);
    }

    main {
      padding: 10px;
      max-width: 820px;
      margin: 0 auto;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 12px;
      margin-top: 10px;
    }

    #reader {
      width: 100%;
      min-height: 320px;
      background: #000;
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
    }

    #reader video {
      width: 100% !important;
      border-radius: 16px;
    }

    .row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    button {
      appearance: none;
      border: 0;
      border-radius: 12px;
      padding: 12px 14px;
      min-height: 48px;
      color: white;
      background: #1f2937;
      font-size: 15px;
      font-weight: 800;
    }

    button:active {
      transform: scale(0.98);
    }

    .btn-wide {
      flex: 1 1 135px;
    }

    .btn-blue {
      background: var(--blue);
    }

    .btn-green {
      background: var(--green);
    }

    .btn-red {
      background: var(--red);
    }

    .btn-orange {
      background: var(--orange);
    }

    .btn-small {
      font-size: 13px;
      min-height: 38px;
      padding: 8px 10px;
      border-radius: 10px;
    }

    .status {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
      margin: 8px 0 0;
      white-space: pre-wrap;
    }

    .ok {
      color: #86efac;
      font-weight: 800;
    }

    .ng {
      color: #fca5a5;
      font-weight: 800;
    }

    .grid3 {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }

    .metric {
      background: #020617;
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 10px;
      text-align: center;
    }

    .metric .num {
      font-size: 26px;
      font-weight: 900;
      line-height: 1.1;
    }

    .metric .label {
      color: var(--muted);
      font-size: 12px;
      margin-top: 4px;
    }

    .label {
      color: var(--muted);
      font-size: 13px;
      margin-bottom: 5px;
    }

    .last {
      background: #020617;
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 12px;
      font-size: 22px;
      font-weight: 900;
      min-height: 54px;
      word-break: break-all;
    }

    input, textarea {
      width: 100%;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: #020617;
      color: var(--text);
      padding: 12px;
      font-size: 16px;
    }

    textarea {
      min-height: 150px;
      font-size: 13px;
      line-height: 1.45;
    }

    .sn-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-top: 8px;
    }

    .sn-item {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      align-items: center;
      background: #020617;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 9px;
    }

    .sn-code {
      font-size: 15px;
      font-weight: 800;
      word-break: break-all;
    }

    .sn-meta {
      font-size: 11px;
      color: var(--muted);
      margin-top: 3px;
    }

    .hint {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.5;
      margin: 8px 0 0;
    }

    .danger-zone {
      border-color: rgba(220, 38, 38, 0.7);
    }
  </style>
</head>

<body>
  <header>
    <h1>S/N連続読み取りテスト</h1>
    <p>html5-qrcode版 / 読めたら即追加</p>
  </header>

  <main>
    <div class="panel">
      <div id="reader"></div>
      <p class="status" id="libraryStatus">読み取りライブラリ確認中...</p>
      <p class="status" id="status">カメラ未起動</p>
    </div>

    <div class="panel">
      <div class="row">
        <button class="btn-blue btn-wide" id="startBtn">カメラ開始</button>
        <button class="btn-red btn-wide" id="stopBtn">停止</button>
      </div>
      <p class="hint">
        ※ カメラ開始後、S/Nバーコードを画面中央に合わせてください。
      </p>
    </div>

    <div class="panel">
      <div class="grid3">
        <div class="metric">
          <div class="num" id="countValue">0</div>
          <div class="label">S/N件数</div>
        </div>
        <div class="metric">
          <div class="num" id="dupValue">0</div>
          <div class="label">重複除外</div>
        </div>
        <div class="metric">
          <div class="num" id="readValue">0</div>
          <div class="label">読取回数</div>
        </div>
      </div>
    </div>

    <div class="panel">
      <div class="label">最後に読んだ値</div>
      <div class="last" id="lastValue">未読み取り</div>
      <p class="hint">
        ※ 1T、QTY、ORIGINなど違う値が入った場合は、一覧から削除してください。
      </p>
    </div>

    <div class="panel">
      <div class="label">手入力追加</div>
      <input id="manualInput" type="text" placeholder="読めないS/Nをここに入力" autocomplete="off" autocapitalize="characters" />
      <div class="row" style="margin-top:8px;">
        <button class="btn-green btn-wide" id="manualAddBtn">手入力を追加</button>
        <button class="btn-orange btn-wide" id="undoBtn">最後の1件を戻す</button>
      </div>
    </div>

    <div class="panel">
      <div class="label">S/N一覧</div>
      <div class="sn-list" id="snList"></div>
    </div>

    <div class="panel">
      <div class="label">出力</div>
      <div class="row">
        <button class="btn-blue btn-wide" id="makeOutputBtn">出力作成</button>
        <button class="btn-green btn-wide" id="copyOutputBtn">コピー</button>
        <button class="btn-blue btn-wide" id="downloadCsvBtn">CSV保存</button>
      </div>
      <textarea id="outputText" placeholder="ここに出力が表示されます"></textarea>
      <p class="hint">
        Formsでは、このS/N一覧を複数行テキスト欄に貼り付ける想定です。
      </p>
    </div>

    <div class="panel danger-zone">
      <div class="row">
        <button class="btn-red btn-wide" id="clearAllBtn">全クリア</button>
      </div>
    </div>
  </main>

  <script>
    const startBtn = document.getElementById("startBtn");
    const stopBtn = document.getElementById("stopBtn");
    const statusEl = document.getElementById("status");
    const libraryStatus = document.getElementById("libraryStatus");

    const countValue = document.getElementById("countValue");
    const dupValue = document.getElementById("dupValue");
    const readValue = document.getElementById("readValue");
    const lastValue = document.getElementById("lastValue");

    const manualInput = document.getElementById("manualInput");
    const manualAddBtn = document.getElementById("manualAddBtn");
    const undoBtn = document.getElementById("undoBtn");

    const snList = document.getElementById("snList");
    const makeOutputBtn = document.getElementById("makeOutputBtn");
    const copyOutputBtn = document.getElementById("copyOutputBtn");
    const downloadCsvBtn = document.getElementById("downloadCsvBtn");
    const outputText = document.getElementById("outputText");
    const clearAllBtn = document.getElementById("clearAllBtn");

    let html5QrCode = null;
    let isRunning = false;

    let serials = [];
    let readCount = 0;
    let dupCount = 0;

    let lastReadText = "";
    let lastReadTime = 0;

    function setStatus(message) {
      statusEl.textContent = message;
    }

    function checkLibrary() {
      if (window.Html5Qrcode) {
        libraryStatus.innerHTML = '<span class="ok">読み取りライブラリ：OK</span>';
        return true;
      }

      libraryStatus.innerHTML = '<span class="ng">読み取りライブラリ：NG</span>\\n通信状態を確認して再読み込みしてください。';
      return false;
    }

    function normalizeCode(value) {
      return String(value || "")
        .trim()
        .replace(/[　\\s]/g, "");
    }

    function nowText() {
      const d = new Date();
      const y = d.getFullYear();
      const m = String(d.getMonth() + 1).padStart(2, "0");
      const day = String(d.getDate()).padStart(2, "0");
      const hh = String(d.getHours()).padStart(2, "0");
      const mm = String(d.getMinutes()).padStart(2, "0");
      const ss = String(d.getSeconds()).padStart(2, "0");
      return `${y}/${m}/${day} ${hh}:${mm}:${ss}`;
    }

    function beep(freq = 880, duration = 90) {
      try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();

        osc.connect(gain);
        gain.connect(ctx.destination);

        osc.frequency.value = freq;
        gain.gain.value = 0.08;

        osc.start();

        setTimeout(() => {
          osc.stop();
          ctx.close();
        }, duration);
      } catch (e) {
      }
    }

    function vibrate(ms = 60) {
      try {
        if (navigator.vibrate) navigator.vibrate(ms);
      } catch (e) {
      }
    }

    function render() {
      countValue.textContent = serials.length;
      dupValue.textContent = dupCount;
      readValue.textContent = readCount;

      snList.innerHTML = "";

      if (serials.length === 0) {
        const empty = document.createElement("div");
        empty.className = "hint";
        empty.textContent = "まだS/Nは追加されていません。";
        snList.appendChild(empty);
        return;
      }

      serials.slice().reverse().forEach((item, revIndex) => {
        const originalIndex = serials.length - 1 - revIndex;

        const row = document.createElement("div");
        row.className = "sn-item";

        const left = document.createElement("div");

        const code = document.createElement("div");
        code.className = "sn-code";
        code.textContent = `${originalIndex + 1}. ${item.value}`;

        const meta = document.createElement("div");
        meta.className = "sn-meta";
        meta.textContent = `${item.source} / ${item.time}`;

        left.appendChild(code);
        left.appendChild(meta);

        const del = document.createElement("button");
        del.className = "btn-red btn-small";
        del.textContent = "削除";
        del.onclick = () => {
          serials.splice(originalIndex, 1);
          render();
          makeOutput();
          setStatus("1件削除しました。");
        };

        row.appendChild(left);
        row.appendChild(del);
        snList.appendChild(row);
      });
    }

    function addSerial(rawValue, source) {
      const value = normalizeCode(rawValue);

      if (!value) {
        setStatus("空の値は追加できません。");
        return;
      }

      if (source === "SCAN") {
        readCount += 1;
      }

      lastValue.textContent = value;

      const exists = serials.some(x => x.value === value);

      if (exists) {
        dupCount += 1;
        beep(330, 120);
        vibrate(120);
        setStatus(`重複のため除外しました：${value}`);
        render();
        return;
      }

      serials.push({
        value,
        source,
        time: nowText()
      });

      beep(940, 80);
      vibrate(50);
      setStatus(`追加しました：${value}`);
      render();
      makeOutput();
    }

    function onScanSuccess(decodedText, decodedResult) {
      const text = normalizeCode(decodedText);
      const now = Date.now();

      if (!text) return;

      if (text === lastReadText && now - lastReadTime < 1200) {
        return;
      }

      lastReadText = text;
      lastReadTime = now;

      addSerial(text, "SCAN");
    }

    function onScanFailure(error) {
      // 読めない瞬間は常に発生するため、表示しない
    }

    async function startCamera() {
      try {
        if (!checkLibrary()) {
          alert(
            "読み取りライブラリを読み込めませんでした。\\n\\n" +
            "Safariの更新ボタンで再読み込みしてください。"
          );
          return;
        }

        if (isRunning) {
          setStatus("すでにカメラ起動中です。");
          return;
        }

        html5QrCode = new Html5Qrcode("reader");

        const config = {
          fps: 12,
          qrbox: function(viewfinderWidth, viewfinderHeight) {
            const width = Math.floor(viewfinderWidth * 0.9);
            const height = Math.floor(viewfinderHeight * 0.25);
            return { width, height };
          },
          aspectRatio: 1.777778,
          disableFlip: false
        };

        setStatus("カメラ起動中...");

        await html5QrCode.start(
          { facingMode: "environment" },
          config,
          onScanSuccess,
          onScanFailure
        );

        isRunning = true;
        setStatus("読み取り中：S/Nバーコードを画面中央に合わせてください。");

      } catch (err) {
        console.error(err);
        setStatus("カメラ起動エラー: " + err.message);
        alert(
          "カメラを起動できませんでした。\\n\\n" +
          "確認してください：\\n" +
          "1. カメラ許可をOKにした\\n" +
          "2. httpsのURLで開いている\\n" +
          "3. SafariまたはChromeで開いている\\n" +
          "4. 他アプリがカメラを使用していない\\n\\n" +
          "詳細: " + err.message
        );
      }
    }

    async function stopCamera() {
      try {
        if (html5QrCode && isRunning) {
          await html5QrCode.stop();
          await html5QrCode.clear();
        }

        html5QrCode = null;
        isRunning = false;
        setStatus("カメラ停止中");

      } catch (err) {
        setStatus("停止処理エラー: " + err.message);
      }
    }

    function addManual() {
      const value = normalizeCode(manualInput.value);

      if (!value) {
        alert("追加するS/Nを入力してください。");
        return;
      }

      addSerial(value, "MANUAL");
      manualInput.value = "";
      manualInput.focus();
    }

    function undoLast() {
      if (serials.length === 0) {
        setStatus("戻すデータがありません。");
        return;
      }

      const removed = serials.pop();
      setStatus(`最後の1件を戻しました：${removed.value}`);
      render();
      makeOutput();
    }

    function makeOutput() {
      const values = serials.map(x => x.value);
      outputText.value = values.join("\\n");
    }

    async function copyOutput() {
      makeOutput();

      if (!outputText.value) {
        alert("コピーする出力がありません。");
        return;
      }

      try {
        await navigator.clipboard.writeText(outputText.value);
        setStatus("出力をコピーしました。");
      } catch (e) {
        outputText.select();
        document.execCommand("copy");
        setStatus("出力をコピーしました。");
      }
    }

    function escapeCsv(value) {
      const s = String(value ?? "");
      return '"' + s.replace(/"/g, '""') + '"';
    }

    function downloadCsv() {
      const lines = [];
      lines.push(["No", "S/N", "Source", "ReadTime"].map(escapeCsv).join(","));

      serials.forEach((item, index) => {
        lines.push([
          index + 1,
          item.value,
          item.source,
          item.time
        ].map(escapeCsv).join(","));
      });

      const csv = "\\uFEFF" + lines.join("\\n");
      const blob = new Blob([csv], { type: "text/csv;charset=utf-8" });
      const url = URL.createObjectURL(blob);

      const d = new Date();
      const y = d.getFullYear();
      const m = String(d.getMonth() + 1).padStart(2, "0");
      const day = String(d.getDate()).padStart(2, "0");
      const hh = String(d.getHours()).padStart(2, "0");
      const mm = String(d.getMinutes()).padStart(2, "0");

      const a = document.createElement("a");
      a.href = url;
      a.download = `sn_test_${y}${m}${day}_${hh}${mm}.csv`;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);

      URL.revokeObjectURL(url);
      setStatus("CSVを保存しました。");
    }

    function clearAll() {
      if (!confirm("S/N一覧、件数、重複数をすべてクリアしますか？")) return;

      serials = [];
      readCount = 0;
      dupCount = 0;
      lastReadText = "";
      lastReadTime = 0;
      lastValue.textContent = "未読み取り";
      outputText.value = "";

      render();
      setStatus("全クリアしました。");
    }

    startBtn.addEventListener("click", startCamera);
    stopBtn.addEventListener("click", stopCamera);

    manualAddBtn.addEventListener("click", addManual);
    undoBtn.addEventListener("click", undoLast);

    manualInput.addEventListener("keydown", e => {
      if (e.key === "Enter") {
        e.preventDefault();
        addManual();
      }
    });

    makeOutputBtn.addEventListener("click", makeOutput);
    copyOutputBtn.addEventListener("click", copyOutput);
    downloadCsvBtn.addEventListener("click", downloadCsv);
    clearAllBtn.addEventListener("click", clearAll);

    window.addEventListener("load", () => {
      setTimeout(checkLibrary, 800);
    });

    render();
    makeOutput();
  </script>
</body>
</html>
